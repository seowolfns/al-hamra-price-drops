name: Crawl PropertyFinder & Deploy

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC = 07:00 Dubai time, daily
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler (all 3 locations)
        run: python crawler/crawl.py

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/al-hamra/ data/marjan-island/ data/mina-al-arab/
          git diff --cached --quiet || git commit -m "chore: update price data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
